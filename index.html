<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selamat Idul Fitri 1447 H</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --dark-blue: #000f27;
            --gold: #d4af37;
            --glass-bg: rgba(255, 255, 255, 0.08); /* Sedikit lebih tebal agar kontras */
            --glass-border: rgba(255, 255, 255, 0.18);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Poppins', sans-serif;
            background: url('background.webp') no-repeat center center;
            background-size: cover;
            overflow: hidden;
            position: relative;
        }

        /* Overlay gelap agar teks & efek glass lebih pop-out */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 10, 30, 0.6);
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px; /* Margin tipis di luar kaca */
        }

        /* Efek Glassmorphism (Glassium) - Batas hampir tepi */
        .glass-card {
            position: relative;
            width: 96%; /* Hampir tepi HP */
            max-width: 440px; /* Ukuran maksimal agar tidak kelebaran di tab/PC */
            height: 88vh; /* Hampir memenuhi tinggi HP */
            padding: 40px 25px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.6);
            text-align: center;
            color: #fff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            overflow: hidden; /* Menjaga asset WebP tetap di dalam */
        }

        /* Menjaga teks tetap di atas gambar */
        h1, .year, .main-text, .closing, .decoration {
            position: relative;
            z-index: 2; /* Di atas gambar */
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 1.9rem;
            color: var(--gold);
            margin-bottom: 8px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }

        .year {
            font-size: 1.1rem;
            font-weight: 300;
            letter-spacing: 4px;
            margin-bottom: 25px;
            opacity: 0.8;
        }

        .main-text {
            font-size: 1.05rem;
            line-height: 1.7;
            margin-bottom: 15px;
            font-weight: 300;
            text-shadow: 0 1px 5px rgba(0,0,0,0.3);
        }

        .closing {
            font-weight: 400;
            color: var(--gold);
            font-style: italic;
            font-size: 1.05rem;
        }

        /* PERBAIKAN: Posisi di KIRI, Ukuran PERBESAR (Scale Up) */
        .asset-foto {
            position: absolute;
            bottom: -50px; /* Sedikit keluar agar terlihat estetik */
            left: -140px; /* Pindah ke KIRI */
            right: auto; /* Matikan posisi kanan */
            width: 640px; /* Ukuran PERBESAR */
            opacity: 0.3; /* Opacity sedikit dinaikkan agar terlihat jelas tapi tetap pendukung */
            filter: brightness(0.85);
            z-index: 1; /* Berada di belakang teks agar teks mudah dibaca */
            /* Efek fading agar menyatu dengan glass */
            mask-image: linear-gradient(to top right, rgba(0,0,0,1) 40%, rgba(0,0,0,0) 90%);
            -webkit-mask-image: linear-gradient(to top right, rgba(0,0,0,1) 40%, rgba(0,0,0,0) 90%);
        }

        /* Dekorasi tambahan (opsional) */
        .decoration {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 35px;
            opacity: 0.2;
            color: var(--gold);
        }

    </style>
</head>
<body>

    <div class="container">
        <div class="glass-card">
            <div class="decoration">☪</div>
            
            <h1>Taqabbalallahu Minna Wa Minkum</h1>
            <div class="year">1447 H</div>

            <p class="main-text">
                <strong>Selamat Hari Raya Idul Fitri.</strong><br>
                Mohon maaf lahir dan batin atas segala kekhilafan. Semoga silaturahmi kita tetap terjaga meski jarak memisahkan.
            </p>

            <p class="closing">Selamat berkumpul dengan keluarga tercinta!</p>

            <img src="orang.webp" alt="Background Profile" class="asset-foto">
        </div>
    </div>

</body>
</html>
